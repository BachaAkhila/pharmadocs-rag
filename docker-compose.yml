version: "3.9"

services:
  api:
    build: .
    container_name: pharmadocs-rag-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./mlruns.db:/app/mlruns.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  mlflow:
    image: python:3.12-slim
    container_name: pharmadocs-mlflow-ui
    working_dir: /app
    volumes:
      - ./mlruns.db:/app/mlruns.db
    ports:
      - "5000:5000"
    command: >
      bash -c "pip install --no-cache-dir mlflow &&
               mlflow ui --backend-store-uri sqlite:///mlruns.db --host 0.0.0.0 --port 5000"
    depends_on:
      - api
